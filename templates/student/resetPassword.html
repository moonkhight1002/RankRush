{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Password Reset</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
<a href="{% url 'homepage' %}" class="home-btn">
    <i class="fas fa-home"></i>
</a>

<div class="auth-simple-shell">
    <div class="auth-simple-card">
        <form method="post">
            {% csrf_token %}
            <h1>Reset Student Password</h1>
            <p class="auth-copy">Enter your registered email address and we will send you a password reset link.</p>
            {% include 'partials/_messages.html' %}
            <div class="auth-form-fields">
                {{ form }}
            </div>
            <button type="submit">Send Email</button>
            <div class="auth-links">
                <span>Need an account? <a href="{% url 'register' %}">Register</a></span>
                <span>Already registered? <a href="{% url 'login' %}">Login</a></span>
            </div>
        </form>
    </div>
</div>
</body>
</html>
