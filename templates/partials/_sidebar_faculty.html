<input type="checkbox" id="faculty-nav-toggle" class="faculty-nav-toggle">

  <span class="faculty-nav-close">&times;</span>
</label>

  <nav class="sidebar-nav">

      <a href="{% url 'faculty-add_question_paper' %}" class="sidebar-link{% if request.resolver_match.url_name == 'faculty-add_question_paper' %} active{% endif %}">Build Paper</a>

    <div class="sidebar-section">

      <a href="{% url 'faculty-sessions' %}" class="sidebar-link{% if request.resolver_match.url_name == 'faculty-sessions' %} active{% endif %}">Active Sessions</a>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-heading">Actions</div>
      <a href="{% url 'contact_support' %}" class="sidebar-link{% if request.resolver_match.url_name == 'contact_support' %} active{% endif %}">Contact Support</a>
    </div>
  </nav>
</aside>
