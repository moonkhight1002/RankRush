<input type="checkbox" id="student-nav-toggle" class="student-nav-toggle">

<label for="student-nav-toggle" class="student-nav-button" aria-label="Toggle navigation">
  <span class="student-nav-open">&#9776;</span>
  <span class="student-nav-close">&times;</span>
</label>

<aside class="student-sidebar">
  <div class="student-sidebar-title">Dashboard</div>

  <nav class="student-sidebar-nav">
    <div class="student-sidebar-section">
      <div class="student-sidebar-heading">Exams</div>
      <a href="{% url 'view_exams_student' %}" class="student-sidebar-link{% if request.resolver_match.url_name == 'view_exams_student' %} active{% endif %}">View Exams</a>
    </div>

    <div class="student-sidebar-section">
      <div class="student-sidebar-heading">Summary</div>
      <a href="{% url 'student-previous' %}" class="student-sidebar-link{% if request.resolver_match.url_name == 'student-previous' %} active{% endif %}">Previous Exams</a>
      <a href="{% url 'view_students_attendance' %}" class="student-sidebar-link{% if request.resolver_match.url_name == 'view_students_attendance' %} active{% endif %}">Attendance</a>
    </div>

    <div class="student-sidebar-section">
      <div class="student-sidebar-heading">Settings</div>
      <a href="{% url 'email-student-pref' %}" class="student-sidebar-link{% if request.resolver_match.url_name == 'email-student-pref' %} active{% endif %}">General Settings</a>
      <a href="{% url 'change_password' %}" class="student-sidebar-link{% if request.resolver_match.url_name == 'change_password' %} active{% endif %}">Change Password</a>
    </div>

    <div class="student-sidebar-section">
      <div class="student-sidebar-heading">Actions</div>
      <a href="{% url 'contact_support' %}" class="student-sidebar-link{% if request.resolver_match.url_name == 'contact_support' %} active{% endif %}">Contact Support</a>
    </div>
  </nav>
</aside>
