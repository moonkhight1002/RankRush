<div class="auth-password-popup" data-password-popup>
    <button
        type="button"
        class="auth-password-trigger"
        aria-label="Password rules"
        aria-expanded="false"
        aria-haspopup="true"
        data-password-popup-trigger
    >
        <i class="fas fa-circle-info" aria-hidden="true"></i>
    </button>
    <div class="auth-password-tooltip" role="tooltip" data-password-popup-content hidden>
        <p>Use a password with:</p>
        <ul data-password-rules-list></ul>
    </div>
</div>
