<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1700" viewBox="0 0 2200 1700" role="img" aria-labelledby="title desc">
  <title id="title">RankRush Exam Portal ERD</title>
  <desc id="desc">High-resolution entity relationship diagram for the RankRush Exam Portal.</desc>
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .panel { fill: #ffffff; stroke: #d6deea; stroke-width: 2; rx: 28; ry: 28; }
      .group { fill: #fbfcff; stroke: #e1e7f0; stroke-width: 1.5; rx: 18; ry: 18; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #172235; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #5b677c; }
      .heading { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #182338; }
      .card { fill: #ffffff; stroke: #8a97af; stroke-width: 2; rx: 16; ry: 16; }
      .head-auth { fill: #deebff; }
      .head-core { fill: #dff4e7; }
      .head-exam { fill: #fff1c2; }
      .head-monitor { fill: #ffe6dd; }
      .head-pref { fill: #ece2ff; }
      .card-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #182338; }
      .field { font: 500 13px 'Consolas', 'Courier New', monospace; fill: #364259; }
      .rule { stroke: #cfd6e3; stroke-width: 1.4; }
      .rel { stroke: #536179; stroke-width: 2.2; fill: none; }
      .rel-dash { stroke: #7b879d; stroke-width: 2; fill: none; stroke-dasharray: 7 6; }
      .rel-label { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #44516a; }
      .tiny { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #4f5b70; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="2200" height="1700" />
  <rect class="panel" x="40" y="40" width="2120" height="1620" />

  <text x="1100" y="100" text-anchor="middle" class="title">RankRush Exam Portal - ERD</text>
  <text x="1100" y="132" text-anchor="middle" class="subtitle">Principal models and their relationships across identity, exam authoring, attempts, and monitoring</text>

  <rect class="group" x="80" y="180" width="620" height="1410" />
  <text x="110" y="220" class="heading">Identity and Support</text>

  <rect class="group" x="740" y="180" width="1380" height="1410" />
  <text x="770" y="220" class="heading">Exams, Attempts, and Monitoring</text>

